replicaCount: 2

image:
  repository: sdd-navigator/frontend
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: nginx
  host: sdd-navigator.local
  annotations: {}
  tls:
    enabled: false
    secretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  API_URL: "http://sdd-navigator-api:8080"

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
