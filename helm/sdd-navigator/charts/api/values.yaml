replicaCount: 2

image:
  repository: sdd-navigator/api
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: api.sdd-navigator.local
  annotations: {}
  tls:
    enabled: false
    secretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  DATABASE_URL: ""
  API_HOST: "0.0.0.0"
  API_PORT: "8080"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
